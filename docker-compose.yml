services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: playercounts-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: playercounts-kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  postgres:
    image: postgres:16
    container_name: playercounts-postgres
    environment:
      POSTGRES_DB: playercounts
      POSTGRES_USER: playercounts
      POSTGRES_PASSWORD: playercounts
    ports:
      - "5432:5432"

  clickhouse:
    image: clickhouse/clickhouse-server:24.4
    container_name: playercounts-clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ./infra/clickhouse-init:/docker-entrypoint-initdb.d

  redis:
    image: redis:7
    container_name: playercounts-redis
    ports:
      - "6379:6379"

  poll-worker:
    build:
      context: .
      dockerfile: services/playercounts-poll-worker-service/Dockerfile
    container_name: playercounts-poll-worker
    depends_on:
      - kafka
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: unless-stopped

  status-consumer:
    build:
      context: .
      dockerfile: services/playercounts-status-consumer-service/Dockerfile
    container_name: playercounts-status-consumer
    depends_on:
      - kafka
      - redis
      - postgres
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/playercounts
      POSTGRES_USERNAME: playercounts
      POSTGRES_PASSWORD: playercounts
    restart: unless-stopped

  api-gateway:
    build:
      context: .
      dockerfile: services/playercounts-api-gateway-service/Dockerfile
    container_name: playercounts-api-gateway
    depends_on:
      - redis
      - postgres
    environment:
      REDIS_HOST: redis
      POSTGRES_JDBC_URL: jdbc:postgresql://postgres:5432/playercounts
      POSTGRES_USERNAME: playercounts
      POSTGRES_PASSWORD: playercounts
      API_GATEWAY_PORT: 8080
    ports:
      - "8080:8080"
    restart: unless-stopped