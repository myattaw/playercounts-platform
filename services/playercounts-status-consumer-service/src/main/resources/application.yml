spring:
  profiles:
    active: local
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      group-id: ${STATUS_CONSUMER_GROUP_ID:playercounts-status-consumer-group}
      auto-offset-reset: earliest
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/playercounts}
    username: ${POSTGRES_USERNAME:playercounts}
    password: ${POSTGRES_PASSWORD:playercounts}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

status-consumer:
  kafka-topic: ${STATUS_CONSUMER_KAFKA_TOPIC:server-ping-results}

cloud:
  sqs:
    queue-url: ${SQS_QUEUE_URL:}
    aws-region: ${AWS_REGION:us-east-1}

clickhouse:
  jdbc-url: jdbc:clickhouse://localhost:8123/default?compress=0
  username: default
  password: