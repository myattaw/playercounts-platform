server:
  port: ${API_GATEWAY_PORT:8080}

spring:
  profiles:
    active: local
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  datasource:
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://localhost:5432/playercounts}
    username: ${POSTGRES_USERNAME:playercounts}
    password: ${POSTGRES_PASSWORD:playercounts}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

playercounts:
  redis-live-prefix: ${REDIS_LIVE_PREFIX:live:server:}

clickhouse:
  jdbc-url: jdbc:clickhouse://localhost:8123/default?compress=0
  username: default
  password:

security:
  jwt:
    secret: your-super-long-secret-key-change-this-in-production
    expiration-ms: 86400000